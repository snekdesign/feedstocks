[workspace]
name = 'feedstocks'
channels = ['conda-forge', 'https://prefix.dev/github-releases']
platforms = ['linux-64', 'osx-64', 'win-64']
requires-pixi = '>=0.63.0'

authors = ['snekdesign']
license-file = 'LICENSE'
readme = 'README.md'
repository = 'https://github.com/snekdesign/feedstocks'

[system-requirements]
macos = '10.15'

[target.linux-64.dependencies]
rattler-build = '>=0.63.0'

[target.osx-64.dependencies]
rattler-build = { version = '>=0.63.0', channel = 'https://prefix.dev/github-releases' }

[target.win-64.dependencies]
rattler-build = '>=0.63.0'

[target.unix.activation]
scripts = ['activate.sh']

[tasks.build]
cmd = [
    'rattler-build',
    'build',
    '--config-file', '$PIXI_HOME/config.toml',
    '--env-isolation', 'none',
    '--no-include-recipe',
    '--variant-config', 'variants.yaml',
    '--recipe-dir',
]

[tasks.diff]
cmd = [
    'rattler-build',
    'debug',
    'create-patch',
    '-d',
]
