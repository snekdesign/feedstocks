context:
  version: 0.1.3
  sha256: f7db1a398866ee6dc71d106d0106b4ffce6cb6d6f70df0fe8797a3a15b72e317

package:
  name: pixi-install-to-prefix
  version: ${{ version }}

source:
- url: https://codeload.github.com/pavelzw/pixi-install-to-prefix/tar.gz/v${{ version }}
  sha256: ${{ sha256 }}
  patches:
  - changes.patch
- path: build.rs
- if: win
  then:
  - url: https://github.com/Chuyu-Team/VC-LTL5/releases/download/v5.3.1/VC-LTL-Binary.7z
    sha256: 7a18799ed3aa84a225610a5447a56bc534c5c98ccb8dec05caba0e3f633431ad
    target_directory: vc_ltl
- if: win
  then:
  - url: https://github.com/Chuyu-Team/YY-Thunks/releases/download/v1.2.1/YY-Thunks-Objs.zip
    sha256: 36b6cf1f8f9ac0d05863140d20d8ca70a796775e520fed2842667b517a867f52
    target_directory: yy_thunks

build:
  number: 0
  script:
  - if: win
    then:
    - set "VC_LTL=%SRC_DIR%\vc_ltl"
    - set "YY_THUNKS=%SRC_DIR%\yy_thunks"
    - cargo install --locked --no-track --path . --root "%LIBRARY_PREFIX%"
    else:
    - cargo install --locked --no-track --path . --root "$PREFIX"
  skip:
  - build_platform != target_platform
  - win and not (compiler('c') is startingwith('vs'))

requirements:
  build:
  - ${{ compiler('c') }}
  - rust >=1.90.0
  - if: linux
    then: diffutils
  - if: microarch_level|int > 0
    then: x86_64-microarch-level ==${{ microarch_level }}

tests:
- script:
  - pixi-install-to-prefix -h

about:
  license: BSD-3-Clause
  license_family: BSD
  license_file: LICENSE
  summary: Install pixi environments to an arbitrary prefix
