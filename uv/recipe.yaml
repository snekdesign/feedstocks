context:
  version: 0.11.3
  sha256: 27cfb1bc7de94c7bb4079b1d14dc7a3afa4313653baa244107fc479729502383

package:
  name: uv
  version: ${{ version }}

source:
  url: https://codeload.github.com/astral-sh/uv/tar.gz/${{ version }}
  sha256: ${{ sha256 }}
  patches:
  - changes.patch

build:
  number: 0
  script:
  - if: win
    then:
    - set AWS_LC_SYS_PREBUILT_NASM=0
    - cargo install --features windows-gui-bin --locked --no-track --path crates\uv --root "%LIBRARY_PREFIX%"
    else:
    - cargo install --locked --no-track --path crates/uv --root "$PREFIX"
  skip:
  - build_platform != target_platform
  - win and not (compiler('c') is startingwith('vs'))

requirements:
  build:
  - ${{ compiler('c') }}
  - rust >=1.91.0
  - if: linux
    then: diffutils
  - if: win
    then: nasm
  - if: microarch_level|int > 0
    then: x86_64-microarch-level ==${{ microarch_level }}

tests:
- script:
  - uv -V

about:
  license: Apache-2.0 OR MIT
  license_file:
  - LICENSE-APACHE
  - LICENSE-MIT
  summary: An extremely fast Python package installer and resolver, written in Rust.
