context:
  version: 8.1.0
  sha256: b072aed6871998cce9b36e7774033105ca29e33632be5b6347f3206898e0756a

package:
  name: ffmpeg
  version: ${{ version }}

source:
- url: https://ffmpeg.org/releases/ffmpeg-${{ version|trim('0')|trim('.') }}.tar.xz
  sha256: ${{ sha256 }}
  patches:
  - changes.patch

build:
  number: 0
  script:
    content:
    - bash -el "%RECIPE_DIR%\build.sh"
    env:
      MSYS2_PATH_TYPE: inherit
  skip:
  - not win
  - build_platform != target_platform
  - not (compiler('c') is startingwith('vs'))

requirements:
  build:
  - clangxx_win-64 >=22.1.0
  - ${{ compiler('c') }}
  - m2-base
  - m2-diffutils
  - m2-make
  host:
  - ffnvcodec-headers 12.*
  - libiconv
  - libplacebo
  - libvulkan-headers
  - libvulkan-loader
  - nasm
  - pkg-config
  - sdl2 >=2.23.1
  - shaderc

tests:
- script:
  - ffmpeg -version
  - ffplay -version
  - ffprobe -version

about:
  license: GPL-2.0-or-later
  license_family: GPL
  license_file: COPYING.GPLv2
  summary: Cross-platform solution to record, convert and stream audio and video.
