context:
  version: 0.67.1
  sha256: 1a38eef962d0e4993bfe34943b68ed1c190fb428d74c298f6fd261b95961d9ca

recipe:
  name: pixi
  version: ${{ version }}

source:
- url: https://codeload.github.com/prefix-dev/pixi/tar.gz/v${{ version }}
  sha256: ${{ sha256 }}
  target_directory: pixi
  patches:
  - changes.patch
- url: https://codeload.github.com/conda/rattler/tar.gz/rattler-v0.40.4
  sha256: 1d6736df87b539a9db57ade9cb3dc308d8b0bddf829ab1ee11c5ad411af34df0
  target_directory: rattler
  patches:
  - 0001-strip-dquotes.patch

build:
  number: 0
  skip:
  - build_platform != target_platform
  - win and not (compiler('c') is startingwith('vs'))

outputs:
- staging:
    name: pixi-build
  requirements:
    build:
    - ${{ compiler('c') }}
    - rust >=1.90.0
    - if: linux
      then: diffutils
    - if: linux
      then: make
    - nasm
    - if: microarch_level|int > 0
      then: x86_64-microarch-level ==${{ microarch_level }}
  build:
    script:
    - cd pixi
    - cargo fetch
    - if: win
      then:
      - set AWS_LC_SYS_PREBUILT_NASM=0
      - cargo install --features performance --frozen --no-track --path crates/pixi --profile dist --root "%LIBRARY_PREFIX%"
      - cargo install --frozen --no-track --path crates/pixi_build_cmake --profile dist --root "%LIBRARY_PREFIX%"
      - cargo install --frozen --no-track --path crates/pixi_build_mojo --profile dist --root "%LIBRARY_PREFIX%"
      - cargo install --frozen --no-track --path crates/pixi_build_python --profile dist --root "%LIBRARY_PREFIX%"
      - cargo install --frozen --no-track --path crates/pixi_build_r --profile dist --root "%LIBRARY_PREFIX%"
      - cargo install --frozen --no-track --path crates/pixi_build_rattler_build --profile dist --root "%LIBRARY_PREFIX%"
      - cargo install --frozen --no-track --path crates/pixi_build_ros --profile dist --root "%LIBRARY_PREFIX%"
      - cargo install --frozen --no-track --path crates/pixi_build_rust --profile dist --root "%LIBRARY_PREFIX%"
      else:
      - cargo install --features performance --frozen --no-track --path crates/pixi --profile dist --root "$PREFIX"
      - cargo install --frozen --no-track --path crates/pixi_build_cmake --profile dist --root "$PREFIX"
      - cargo install --frozen --no-track --path crates/pixi_build_mojo --profile dist --root "$PREFIX"
      - cargo install --frozen --no-track --path crates/pixi_build_python --profile dist --root "$PREFIX"
      - cargo install --frozen --no-track --path crates/pixi_build_r --profile dist --root "$PREFIX"
      - cargo install --frozen --no-track --path crates/pixi_build_rattler_build --profile dist --root "$PREFIX"
      - cargo install --frozen --no-track --path crates/pixi_build_ros --profile dist --root "$PREFIX"
      - cargo install --frozen --no-track --path crates/pixi_build_rust --profile dist --root "$PREFIX"
- package:
    name: pixi
  inherit: pixi-build
  build:
    files:
    - bin/pixi
    - Library/bin/pixi.exe
  tests:
  - script:
    - pixi -V
- package:
    name: pixi-build-cmake
  inherit: pixi-build
  build:
    files:
    - bin/pixi-build-cmake
    - Library/bin/pixi-build-cmake.exe
  tests:
  - script:
    - pixi-build-cmake help
- package:
    name: pixi-build-mojo
  inherit: pixi-build
  build:
    files:
    - bin/pixi-build-mojo
    - Library/bin/pixi-build-mojo.exe
  tests:
  - script:
    - pixi-build-mojo help
- package:
    name: pixi-build-python
  inherit: pixi-build
  build:
    files:
    - bin/pixi-build-python
    - Library/bin/pixi-build-python.exe
  tests:
  - script:
    - pixi-build-python help
- package:
    name: pixi-build-r
  inherit: pixi-build
  build:
    files:
    - bin/pixi-build-r
    - Library/bin/pixi-build-r.exe
  tests:
  - script:
    - pixi-build-r help
- package:
    name: pixi-build-rattler-build
  inherit: pixi-build
  build:
    files:
    - bin/pixi-build-rattler-build
    - Library/bin/pixi-build-rattler-build.exe
  tests:
  - script:
    - pixi-build-rattler-build help
- package:
    name: pixi-build-ros
  inherit: pixi-build
  build:
    files:
    - bin/pixi-build-ros
    - Library/bin/pixi-build-ros.exe
  tests:
  - script:
    - pixi-build-ros help
- package:
    name: pixi-build-rust
  inherit: pixi-build
  build:
    files:
    - bin/pixi-build-rust
    - Library/bin/pixi-build-rust.exe
  tests:
  - script:
    - pixi-build-rust help

about:
  license: BSD-3-Clause
  license_family: BSD
  license_file: pixi/LICENSE
  summary: pixi is a cross-platform, multi-language package manager and workflow tool build on the shoulders of the conda ecosystem.
