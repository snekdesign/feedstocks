context:
  version: 1.9.0
  sha256: 75b27d4d6df44bd34e2f70663cfd998f5ec41e680e1e593238bbe517a84c7ed2

package:
  name: libgit2
  version: ${{ version }}

source:
  url: https://codeload.github.com/libgit2/libgit2/tar.gz/v${{ version }}
  sha256: ${{ sha256 }}
  patches:
  - changes.patch

build:
  number: 0
  script:
  - >-
    cmake
    -B build
    -D BUILD_CLI=OFF
    -D BUILD_EXAMPLES=ON
    -D BUILD_TESTS=OFF
    -D REGEX_BACKEND=pcre2
    -D STATIC_CRT=OFF
    -D USE_SSH=exec
    %CMAKE_ARGS%
  - cmake --build build --config Release
  - cmake --install build
  skip:
  - not win
  - build_platform != target_platform
  - not (compiler('c') is startingwith('vs'))

requirements:
  build:
  - cmake >=3.5.1
  - ${{ compiler('c') }}
  host:
  - pcre2
  - zlib
  run:
  - openssh

tests:
- script:
  - lg2 || if %ERRORLEVEL% EQU 1 exit 0

about:
  license_file: COPYING
  summary: libgit2 is a portable, pure C implementation of the Git core methods provided as a re-entrant linkable library with a solid API, allowing you to write native speed custom Git applications in any language which supports C bindings.
