  # https://open-vsx.org/api/charliermarsh/ruff/win32-x64/versions?size=1
  ruff_version: 2026.56.0
  # https://open-vsx.org/api/charliermarsh/ruff/win32-x64/latest/file/sha256
  ruff_sha256: 894ab53c7fff2e1e3fa1d9de1dc2ed7caffb81b116c01f1f3876fa345fd7a8ce
  # https://open-vsx.org/api/tombi-toml/tombi/win32-x64/versions?size=1
