context:
  version: 3.6.1
  sha256: 1dd2d727f7591d6eb34a2d99787fbcc9125062583128b1340b300fbea5b3cb24

package:
  name: sumatrapdf
  version: ${{ version }}

source:
  url: https://codeload.github.com/sumatrapdfreader/sumatrapdf/tar.gz/${{ version|trim('0')|trim('.') }}rel
  sha256: ${{ sha256 }}
  patches:
  - changes.patch

build:
  number: 0
  script:
  - msbuild vs2022\SumatraPDF.vcxproj -p:Configuration=Release;Platform=x64
  - mklink /H "%LIBRARY_BIN%\SumatraPDF.exe" out\rel64\SumatraPDF.exe
  - (robocopy "%RECIPE_DIR%" "%LIBRARY_PREFIX%\etc\sumatrapdf" settings.txt) ^& if %ERRORLEVEL% LEQ 1 exit 0
  skip:
  - not win
  - build_platform != target_platform
  - not (compiler('cxx') is startingwith('vs'))

requirements:
  build:
  - ${{ compiler('cxx') }}
  host:
  - bzip2
  - freetype
  - harfbuzz
  - jbig2dec
  - libbrotlidec
  - libbrotlienc
  - libgumbo
  - libheif
  - libjpeg-turbo
  - libunrar
  - libwebp-base
  - openjpeg
  - zlib
  ignore_run_exports:
    from_package:
    - jbig2dec

about:
  license_file: AUTHORS
  summary: SumatraPDF reader
